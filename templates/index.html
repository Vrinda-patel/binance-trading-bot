<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Futures Trading Bot</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-panel">
            <h1><span class="gradient-text">Primetrade.ai</span> Bot</h1>
            <div class="status-indicator">
                <div class="pulse"></div> Testnet Active
            </div>
        </header>

        <main class="dashboard">
            <!-- Order Form Panel -->
            <section class="glass-panel order-panel">
                <h2>Place Order</h2>
                <form id="orderForm">
                    <div class="form-group">
                        <label for="symbol">Symbol</label>
                        <input type="text" id="symbol" name="symbol" placeholder="e.g. BTCUSDT" required autocomplete="off">
                    </div>

                    <div class="form-row">
                        <div class="form-group half">
                            <label for="side">Side</label>
                            <select id="side" name="side">
                                <option value="BUY">BUY</option>
                                <option value="SELL">SELL</option>
                            </select>
                        </div>
                        <div class="form-group half">
                            <label for="type">Type</label>
                            <select id="type" name="type" onchange="togglePriceField()">
                                <option value="MARKET">MARKET</option>
                                <option value="LIMIT">LIMIT</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="quantity">Quantity</label>
                        <input type="number" id="quantity" name="quantity" step="0.001" placeholder="e.g. 0.01" required>
                    </div>

                    <div class="form-group" id="priceGroup" style="display: none;">
                        <label for="price">Price</label>
                        <input type="number" id="price" name="price" step="0.1" placeholder="Required for LIMIT">
                    </div>

                    <button type="submit" id="submitBtn" class="btn primary-btn">
                        <span>Execute Order</span>
                        <div class="loader" id="submitLoader"></div>
                    </button>
                </form>
            </section>

            <!-- Order History Panel -->
            <section class="glass-panel history-panel">
                <h2>Recent Orders</h2>
                <div class="history-list" id="historyList">
                    <div class="loading-history">Loading history...</div>
                </div>
            </section>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
